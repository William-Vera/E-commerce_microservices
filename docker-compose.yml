services:

  eureka-server:
    build:
      context: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  postgres-user:
    image: postgres:16
    container_name: postgres-user
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_user_data:/var/lib/postgresql/data

  postgres-product:
    image: postgres:16
    container_name: postgres-product
    environment:
      POSTGRES_DB: productdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres_product_data:/var/lib/postgresql/data

  user-service:
    build:
      context: ./user-service
    container_name: user-service
    environment:
      DB_URL: jdbc:postgresql://postgres-user:5432/userdb
      DB_USER: postgres
      DB_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      EUREKA_URL: http://eureka-server:8761/eureka
    ports:
      - "8082:8082"
    depends_on:
      eureka-server:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      postgres-user:
        condition: service_started

  product-service:
    build:
      context: ./product-service
    container_name: product-service
    environment:
      DB_URL: jdbc:postgresql://postgres-product:5432/productdb
      DB_USER: postgres
      DB_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      EUREKA_URL: http://eureka-server:8761/eureka
    ports:
      - "8081:8081"
    depends_on:
      eureka-server:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      postgres-product:
        condition: service_started

  postgres-cart:
    image: postgres:16
    container_name: postgres-cart
    environment:
      POSTGRES_DB: cartdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - postgres_cart_data:/var/lib/postgresql/data

  postgres-order:
    image: postgres:16
    container_name: postgres-order
    environment:
      POSTGRES_DB: orderdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    volumes:
      - postgres_order_data:/var/lib/postgresql/data

  postgres-promotion:
    image: postgres:16
    container_name: postgres-promotion
    environment:
      POSTGRES_DB: promotiondb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5437:5432"
    volumes:
      - postgres_promotion_data:/var/lib/postgresql/data

  postgres-favorites:
    image: postgres:16
    container_name: postgres-favorites
    environment:
      POSTGRES_DB: favoritesdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5438:5432"
    volumes:
      - postgres_favorites_data:/var/lib/postgresql/data

  cart-service:
    build:
      context: ./cart-service
    container_name: cart-service
    environment:
      DB_URL: jdbc:postgresql://postgres-cart:5432/cartdb
      DB_USER: postgres
      DB_PASSWORD: postgres
      EUREKA_URL: http://eureka-server:8761/eureka
    ports:
      - "8083:8083"
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres-cart:
        condition: service_started

  order-service:
    build:
      context: ./order-service
    container_name: order-service
    environment:
      DB_URL: jdbc:postgresql://postgres-order:5432/orderdb
      DB_USER: postgres
      DB_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      EUREKA_URL: http://eureka-server:8761/eureka
    ports:
      - "8084:8084"
    depends_on:
      eureka-server:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      postgres-order:
        condition: service_started

  notification-service:
    build:
      context: ./notification-service
    container_name: notification-service
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      EUREKA_URL: http://eureka-server:8761/eureka
      SALES_EMAIL_ENABLED: ${SALES_EMAIL_ENABLED}
      SALES_EMAIL_FROM: ${SALES_EMAIL_FROM}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH}
      MAIL_SMTP_STARTTLS: ${MAIL_SMTP_STARTTLS}
      JAVA_TOOL_OPTIONS: "-Djava.net.preferIPv4Stack=true -Djava.net.preferIPv6Addresses=false"
    ports:
      - "8087:8087"
    depends_on:
      eureka-server:
        condition: service_healthy
      rabbitmq:
        condition: service_started

  promotion-service:
    build:
      context: ./promotion-service
    container_name: promotion-service
    environment:
      DB_URL: jdbc:postgresql://postgres-promotion:5432/promotiondb
      DB_USER: postgres
      DB_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      EUREKA_URL: http://eureka-server:8761/eureka
    ports:
      - "8085:8085"
    depends_on:
      eureka-server:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      postgres-promotion:
        condition: service_started

  favotite-service:
    build:
      context: ./favotite-service
    container_name: favotite-service
    environment:
      DB_URL: jdbc:postgresql://postgres-favorites:5432/favoritesdb
      DB_USER: postgres
      DB_PASSWORD: postgres
      EUREKA_URL: http://eureka-server:8761/eureka
    ports:
      - "8086:8086"
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres-favorites:
        condition: service_started

  api-gateway:
    build:
      context: ./api-gateway
    container_name: api-gateway
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka
    ports:
      - "8080:8080"
    depends_on:
      eureka-server:
        condition: service_healthy
      user-service:
        condition: service_started
      product-service:
        condition: service_started

volumes:
  postgres_user_data:
  postgres_product_data:
  postgres_cart_data:
  postgres_order_data:
  postgres_promotion_data:
  postgres_favorites_data:
