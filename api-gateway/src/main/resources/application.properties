spring.application.name=api-gateway

server.port=8080

eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}
eureka.instance.prefer-ip-address=true

spring.cloud.gateway.routes[0].id=product-service
spring.cloud.gateway.routes[0].uri=lb://product-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/products/**,/api/products
spring.cloud.gateway.routes[0].filters[0]=RewritePath=/api/products(?<segment>/?.*),/products${segment}

spring.cloud.gateway.routes[1].id=user-service
spring.cloud.gateway.routes[1].uri=lb://user-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/users/**
spring.cloud.gateway.routes[1].filters[0]=RewritePath=/api/users/(?<segment>.*),/users/${segment}

spring.cloud.gateway.routes[2].id=auth-service
spring.cloud.gateway.routes[2].uri=lb://user-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/auth/**
spring.cloud.gateway.routes[2].filters[0]=RewritePath=/api/auth/(?<segment>.*),/auth/${segment}

spring.cloud.gateway.routes[3].id=cart-service
spring.cloud.gateway.routes[3].uri=lb://cart-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/carts/**,/api/carts
spring.cloud.gateway.routes[3].filters[0]=RewritePath=/api/carts(?<segment>/?.*),/cart${segment}

spring.cloud.gateway.routes[4].id=order-service
spring.cloud.gateway.routes[4].uri=lb://order-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/orders/**,/api/orders
spring.cloud.gateway.routes[4].filters[0]=RewritePath=/api/orders(?<segment>/?.*),/orders${segment}

spring.cloud.gateway.routes[5].id=promotion-service
spring.cloud.gateway.routes[5].uri=lb://promotion-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/promotions/**,/api/promotions
spring.cloud.gateway.routes[5].filters[0]=RewritePath=/api/promotions(?<segment>/?.*),/promotions${segment}

spring.cloud.gateway.routes[6].id=favotite-service
spring.cloud.gateway.routes[6].uri=lb://favotite-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/favorites/**,/api/favorites
spring.cloud.gateway.routes[6].filters[0]=RewritePath=/api/favorites(?<segment>/?.*),/favorites${segment}

