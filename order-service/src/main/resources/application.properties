spring.application.name=order-service
server.port=8084

eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}
eureka.instance.prefer-ip-address=true

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

app.rabbitmq.exchange=ecommerce.events
app.rabbitmq.order-paid-routing-key=order.paid
app.rabbitmq.order-paid-queue=promotion.order.paid.queue

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update

app.cart-service.base-url=${CART_SERVICE_BASE_URL:http://cart-service:8083}
app.product-service.base-url=${PRODUCT_SERVICE_BASE_URL:http://product-service:8081}
app.promotion-service.base-url=${PROMOTION_SERVICE_BASE_URL:http://promotion-service:8085}
app.user-service.base-url=${USER_SERVICE_BASE_URL:http://api-gateway:8080/api/users}
